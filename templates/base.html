<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ page_title }} — {{ name }}</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="glow-dot"></div>
      <div>
        <h1>{{ name }}</h1>
        <p class="subtitle">{{ title }}</p>
      </div>
    </div>

    <nav class="nav">
      <a class="btn" href="./index.html">Accueil</a>
      <a class="btn" href="./realisations.html">Réalisations</a>
      <a class="btn" href="./experience.html">Expérience</a>
      <a class="btn" href="./formation.html">Formation</a>
      <a class="btn" href="./competences.html">Compétences</a>
      <a class="btn" href="./extra.html">Langues & Intérêts</a>
      <a class="btn" href="./contact.html">Contact</a>
    </nav>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>© {{ name }}</span>
  </footer>

  <script src="./assets/app.js"></script>
</body>
</html>
