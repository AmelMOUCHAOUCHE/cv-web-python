{% extends "base.html" %}
{% set page_title = "Formation" %}
{% block content %}
<section class="card">
  <h2>Formation</h2>
  <div class="timeline">
    {% for f in formation_timeline %}
    <div class="t-item">
      <div class="t-dot"></div>
      <div class="t-content tile">
        <div class="t-head">
          <strong>{{ f.date }}</strong>
          <span class="muted">{{ f.place }}</span>
        </div>
        <h3>{{ f.title }}</h3>
        <ul>
          {% for pt in f.points %}
          <li>{{ pt }}</li>
          {% endfor %}
        </ul>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
