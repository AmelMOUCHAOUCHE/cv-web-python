{% extends "base.html" %}
{% set page_title = "Accueil" %}
{% block content %}
<section class="card hero">
  <img class="avatar" src="./assets/{{ photo }}" alt="Photo de {{ name }}" />
  <div>
    <h2 class="big">{{ name }}</h2>
    <p class="lead">{{ title }}</p>

    <div class="pill">{{ alternance_rhythm }}</div>
    <div class="pill">📍 {{ location }} •  {{ links.handle }}</div>

    <div class="pill">À propos</div>
    <p class="muted">{{ about }}</p>

    <div class="pill">Ce que je cherche</div>
    <p class="muted">{{ searching }}</p>

    <div class="links">
      <a class="link" href="{{ links.linkedin }}" target="_blank" rel="noreferrer">LinkedIn</a>
      <a class="link" href="{{ links.github }}" target="_blank" rel="noreferrer">GitHub</a>
      <a class="link" href="mailto:{{ links.email }}">Email</a>
    </div>
  </div>
</section>
{% endblock %}
